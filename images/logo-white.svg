<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140">
  <defs>
    <linearGradient id="textGradW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,1)"/>
      <stop offset="100%" style="stop-color:rgba(232,240,255,1)"/>
    </linearGradient>
  </defs>

  <!-- Relaxing figure - white version for gradient backgrounds -->
  <g transform="translate(130, 0)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Head -->
    <circle cx="42" cy="16" r="13" stroke="white" stroke-width="3.2" fill="none"/>

    <!-- Closed eye -->
    <path d="M36,14 Q39,18 42,14" stroke="white" stroke-width="2.2" fill="none"/>

    <!-- Smile -->
    <path d="M38,21 Q41,24 44,21" stroke="white" stroke-width="1.8" fill="none"/>

    <!-- Arm behind head -->
    <path d="M30,28 C36,20 44,12 52,6" stroke="white" stroke-width="3.2"/>
    <path d="M52,6 C54,4 56,5 55,8" stroke="white" stroke-width="3.2"/>

    <!-- Torso -->
    <path d="M30,28 C24,34 16,42 8,50" stroke="white" stroke-width="3.2"/>

    <!-- Support arm -->
    <path d="M18,38 C12,34 4,28 -2,24" stroke="white" stroke-width="3.2"/>
    <path d="M-2,24 C-5,22 -6,24 -4,26" stroke="white" stroke-width="3.2"/>

    <!-- Hips -->
    <path d="M8,50 C14,52 22,52 30,50" stroke="rgba(255,255,255,0.9)" stroke-width="3.2"/>

    <!-- Bent leg -->
    <path d="M30,50 C40,44 50,36 58,40" stroke="rgba(255,255,255,0.85)" stroke-width="3.2"/>
    <path d="M58,40 C62,44 68,46 72,42" stroke="rgba(255,255,255,0.85)" stroke-width="3.2"/>

    <!-- Extended leg -->
    <path d="M26,54 C36,56 48,54 58,52" stroke="rgba(255,255,255,0.85)" stroke-width="3.2"/>
    <path d="M58,52 C62,54 66,52 68,48" stroke="rgba(255,255,255,0.85)" stroke-width="3.2"/>

  </g>

  <!-- Text -->
  <text x="190" y="118" text-anchor="middle" font-family="'Nunito', 'Segoe UI', 'Trebuchet MS', sans-serif" font-size="42" font-weight="700" fill="url(#textGradW)" letter-spacing="-0.5">relajate.com</text>
</svg>