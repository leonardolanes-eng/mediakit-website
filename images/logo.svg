<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 140">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B9BD2"/>
      <stop offset="25%" style="stop-color:#8088C8"/>
      <stop offset="50%" style="stop-color:#9080BE"/>
      <stop offset="75%" style="stop-color:#6AAA98"/>
      <stop offset="100%" style="stop-color:#4DAA7A"/>
    </linearGradient>
    <linearGradient id="figGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B9BD2"/>
      <stop offset="50%" style="stop-color:#6B9BD2"/>
      <stop offset="100%" style="stop-color:#5AAA8A"/>
    </linearGradient>
  </defs>

  <!-- Relaxing figure - reclining person with arm behind head -->
  <g transform="translate(130, 0)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Head - circle -->
    <circle cx="42" cy="16" r="13" stroke="#6B9BD2" stroke-width="3.2" fill="none"/>

    <!-- Closed eye - crescent/arc shape -->
    <path d="M36,14 Q39,18 42,14" stroke="#6B9BD2" stroke-width="2.2" fill="none"/>

    <!-- Gentle smile -->
    <path d="M38,21 Q41,24 44,21" stroke="#6B9BD2" stroke-width="1.8" fill="none"/>

    <!-- Arm behind head - goes from neck up-right, bending at elbow -->
    <path d="M30,28 C36,20 44,12 52,6" stroke="#6B9BD2" stroke-width="3.2"/>

    <!-- Elbow hand behind head -->
    <path d="M52,6 C54,4 56,5 55,8" stroke="#6B9BD2" stroke-width="3.2"/>

    <!-- Upper body / torso - angled down to the left -->
    <path d="M30,28 C24,34 16,42 8,50" stroke="#6B9BD2" stroke-width="3.2"/>

    <!-- Left arm - supporting, going down-left from torso -->
    <path d="M18,38 C12,34 4,28 -2,24" stroke="#6B9BD2" stroke-width="3.2"/>

    <!-- Hand/elbow of support arm -->
    <path d="M-2,24 C-5,22 -6,24 -4,26" stroke="#6B9BD2" stroke-width="3.2"/>

    <!-- Hip area connecting to legs -->
    <path d="M8,50 C14,52 22,52 30,50" stroke="url(#figGrad)" stroke-width="3.2"/>

    <!-- Upper leg going right with knee bent up -->
    <path d="M30,50 C40,44 50,36 58,40" stroke="#5AAA8A" stroke-width="3.2"/>

    <!-- Lower leg from bent knee -->
    <path d="M58,40 C62,44 68,46 72,42" stroke="#5AAA8A" stroke-width="3.2"/>

    <!-- Second leg - more extended to the right -->
    <path d="M26,54 C36,56 48,54 58,52" stroke="#5AAA8A" stroke-width="3.2"/>

    <!-- Foot of second leg -->
    <path d="M58,52 C62,54 66,52 68,48" stroke="#5AAA8A" stroke-width="3.2"/>

  </g>

  <!-- Text "relajate.com" -->
  <text x="190" y="118" text-anchor="middle" font-family="'Nunito', 'Segoe UI', 'Trebuchet MS', sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)" letter-spacing="-0.5">relajate.com</text>
</svg>