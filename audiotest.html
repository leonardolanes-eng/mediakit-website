<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Test</title>
  <style>
    body { font-family: sans-serif; padding: 1rem; background: #1a1a2e; color: white; }
    button {
      display: block; width: 100%; padding: 1.5rem; font-size: 1.3rem;
      border: none; border-radius: 1rem; margin: 0.75rem 0; cursor: pointer;
      font-weight: bold;
    }
    #btn1 { background: #4ade80; color: #000; }
    #btn2 { background: #60a5fa; color: #000; }
    #btn3 { background: #f59e0b; color: #000; }
    #log {
      background: #0f0f1a; border-radius: 0.5rem; padding: 1rem;
      font-family: monospace; font-size: 0.85rem; min-height: 150px;
      white-space: pre-wrap; word-break: break-all; margin-top: 1rem;
      border: 1px solid #333;
    }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .info { color: #93c5fd; }
  </style>
</head>
<body>
  <h2>🔊 Audio Test - Relajate.com</h2>

  <button id="btn1">🟢 TEST 1: Beep Simple (440Hz)</button>
  <button id="btn2">🔵 TEST 2: Rain Noise</button>
  <button id="btn3">🟡 TEST 3: Mini Player Play</button>

  <div id="log">Toca un botón para empezar el diagnóstico...\n</div>

  <script>
    var log = document.getElementById('log');
    function logMsg(msg, type) {
      var span = document.createElement('span');
      span.className = type || 'info';
      span.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n';
      log.appendChild(span);
      log.scrollTop = log.scrollHeight;
    }

    // Show device info on load
    logMsg('Browser: ' + navigator.userAgent.slice(0,80));
    logMsg('AudioContext available: ' + !!(window.AudioContext || window.webkitAudioContext));

    // ---- TEST 1: Simple beep ----
    var ctx1 = null;
    document.getElementById('btn1').addEventListener('touchstart', function(e) {
      e.preventDefault();
      logMsg('--- TEST 1 start ---');
      try {
        ctx1 = new (window.AudioContext || window.webkitAudioContext)();
        logMsg('Context created. State: ' + ctx1.state);

        // Silent buffer unlock
        var buf = ctx1.createBuffer(1, 1, 22050);
        var src = ctx1.createBufferSource();
        src.buffer = buf; src.connect(ctx1.destination); src.start(0);
        logMsg('Silent buffer played');

        ctx1.resume().then(function() {
          logMsg('resume() resolved. State: ' + ctx1.state, 'ok');

          // Play 440Hz tone
          var osc = ctx1.createOscillator();
          var gain = ctx1.createGain();
          osc.frequency.value = 440;
          gain.gain.setValueAtTime(0.5, ctx1.currentTime);
          gain.gain.linearRampToValueAtTime(0, ctx1.currentTime + 1.5);
          osc.connect(gain); gain.connect(ctx1.destination);
          osc.start(); osc.stop(ctx1.currentTime + 1.5);
          logMsg('Oscillator started at 440Hz, should hear beep now!', 'ok');
        }).catch(function(err) {
          logMsg('resume() FAILED: ' + err, 'err');
        });
      } catch(err) {
        logMsg('ERROR: ' + err, 'err');
      }
    }, {passive: false});

    // ---- TEST 2: Rain noise ----
    var ctx2 = null;
    document.getElementById('btn2').addEventListener('touchstart', function(e) {
      e.preventDefault();
      logMsg('--- TEST 2 start ---');
      try {
        ctx2 = new (window.AudioContext || window.webkitAudioContext)();
        logMsg('Context created. State: ' + ctx2.state);

        var buf = ctx2.createBuffer(1, 1, 22050);
        var src = ctx2.createBufferSource();
        src.buffer = buf; src.connect(ctx2.destination); src.start(0);

        ctx2.resume().then(function() {
          logMsg('resume() resolved. State: ' + ctx2.state, 'ok');

          // White noise
          var bufSize = ctx2.sampleRate * 2;
          var noiseBuf = ctx2.createBuffer(1, bufSize, ctx2.sampleRate);
          var data = noiseBuf.getChannelData(0);
          for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
          var noise = ctx2.createBufferSource();
          noise.buffer = noiseBuf; noise.loop = true;
          var hp = ctx2.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1000;
          var gain = ctx2.createGain(); gain.gain.value = 0.3;
          noise.connect(hp); hp.connect(gain); gain.connect(ctx2.destination);
          noise.start();
          logMsg('Rain noise started! Should hear rain for 5 seconds...', 'ok');
          setTimeout(function() { try { noise.stop(); logMsg('Rain stopped.'); } catch(e){} }, 5000);
        }).catch(function(err) {
          logMsg('resume() FAILED: ' + err, 'err');
        });
      } catch(err) {
        logMsg('ERROR: ' + err, 'err');
      }
    }, {passive: false});

    // ---- TEST 3: Mini player ----
    document.getElementById('btn3').addEventListener('touchstart', function(e) {
      e.preventDefault();
      logMsg('--- TEST 3: Mini Player ---');
      if (window._relajateAudio) {
        logMsg('_relajateAudio API found', 'ok');
        logMsg('isPlaying before: ' + window._relajateAudio.isPlaying());
        window._relajateAudio.toggle();
        setTimeout(function() {
          logMsg('isPlaying after: ' + window._relajateAudio.isPlaying(), 'ok');
        }, 200);
      } else {
        logMsg('_relajateAudio not found (mini-player.js not loaded on this page)', 'err');
      }
    }, {passive: false});
  </script>
  <script src="mini-player.js"></script>
</body>
</html>
